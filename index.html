<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Расписание детей</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --pink:#f472b6;--pink-bg:#fce7f3;--pink-light:#fdf2f8;
  --blue:#3b82f6;--blue-bg:#dbeafe;--blue-light:#eff6ff;
  --gray:#6b7280;--gray-light:#f3f4f6;--border:#e5e7eb;
  --radius:12px;--shadow:0 4px 24px rgba(0,0,0,.09);
}
body{font-family:'Segoe UI',Arial,sans-serif;background:#f8fafc;color:#1f2937;min-height:100vh}

/* HEADER */
.header{background:#fff;border-bottom:1px solid var(--border);padding:14px 20px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:200;box-shadow:0 2px 8px rgba(0,0,0,.05)}
.header-title{font-size:1.1rem;font-weight:700}
.header-title span{font-size:.75rem;font-weight:400;color:var(--gray);display:block}
.legend{display:flex;gap:12px}
.legend-chip{display:flex;align-items:center;gap:6px;font-size:.8rem;font-weight:500;padding:4px 10px;border-radius:99px}
.chip-ailin{background:var(--pink-bg);color:#9d174d}
.chip-daulet{background:var(--blue-bg);color:#1e40af}

/* WEEK NAV */
.week-nav{background:#fff;border-bottom:1px solid var(--border);padding:10px 20px;display:flex;align-items:center;justify-content:space-between;gap:8px}
.week-label{font-size:.95rem;font-weight:600;text-align:center;flex:1}
.week-label small{display:block;font-size:.75rem;font-weight:400;color:var(--gray)}
.btn-nav{background:var(--gray-light);border:none;border-radius:8px;padding:7px 14px;cursor:pointer;font-size:1rem;transition:background .15s}
.btn-nav:hover{background:var(--border)}
.btn-today-jump{background:#eff6ff;border:none;border-radius:8px;padding:6px 12px;font-size:.8rem;color:var(--blue);cursor:pointer;font-weight:500;transition:background .15s}
.btn-today-jump:hover{background:var(--blue-bg)}

/* TABS */
.tabs{display:flex;background:#fff;border-bottom:1px solid var(--border);padding:0 20px}
.tab{flex:1;padding:12px;text-align:center;font-size:.88rem;font-weight:500;color:var(--gray);border-bottom:2px solid transparent;cursor:pointer;transition:all .15s}
.tab.active{color:#1f2937;border-bottom-color:#1f2937}

/* COPY BANNER */
.copy-banner{display:none;background:#fffbeb;border:1px solid #fde68a;border-radius:var(--radius);margin:16px 20px 0;padding:12px 16px;font-size:.85rem;align-items:center;justify-content:space-between;gap:12px}
.copy-banner.show{display:flex}
.btn-copy{background:#f59e0b;color:#fff;border:none;border-radius:8px;padding:7px 14px;font-size:.82rem;cursor:pointer;white-space:nowrap;font-weight:500}
.btn-copy:hover{background:#d97706}

/* MAIN */
.main{padding:16px 20px 100px}

/* DAY VIEW */
.day-tabs{display:flex;gap:6px;margin-bottom:16px;overflow-x:auto;padding-bottom:4px}
.day-tab{flex-shrink:0;padding:8px 14px;border-radius:10px;border:1px solid var(--border);background:#fff;font-size:.82rem;cursor:pointer;text-align:center;transition:all .15s;min-width:56px}
.day-tab .dt-name{font-weight:600;font-size:.8rem}
.day-tab .dt-num{font-size:.75rem;color:var(--gray)}
.day-tab.active{background:#1f2937;color:#fff;border-color:#1f2937}
.day-tab.active .dt-num{color:#9ca3af}
.day-tab.is-today{border-color:var(--blue);color:var(--blue)}
.day-tab.is-today.active{background:var(--blue);border-color:var(--blue);color:#fff}

.day-lessons{display:flex;flex-direction:column;gap:10px}
.empty-day{text-align:center;padding:48px 20px;color:var(--gray)}
.empty-day .empty-icon{font-size:2.5rem;margin-bottom:10px}
.empty-day p{font-size:.9rem}

/* WEEK VIEW */
.week-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:8px}
.week-col{}
.week-col-head{text-align:center;padding:8px 4px;font-size:.75rem;font-weight:600;color:var(--gray);border-radius:8px;margin-bottom:6px;background:#fff;border:1px solid var(--border)}
.week-col-head.is-today{background:#1f2937;color:#fff;border-color:#1f2937}
.week-col-head .wc-day{font-size:.8rem;font-weight:700}
.week-col-head .wc-date{font-size:.7rem;opacity:.7}
.week-col-body{display:flex;flex-direction:column;gap:5px}
.week-add-btn{width:100%;border:1.5px dashed var(--border);background:transparent;border-radius:8px;padding:8px 4px;font-size:.7rem;color:var(--gray);cursor:pointer;text-align:center;margin-top:4px;transition:all .15s}
.week-add-btn:hover{border-color:var(--gray);color:#1f2937}

/* LESSON CARD */
.lesson-card{background:#fff;border-radius:10px;padding:10px 12px;border-left:4px solid transparent;box-shadow:0 1px 4px rgba(0,0,0,.07);cursor:pointer;transition:transform .1s,box-shadow .1s;position:relative}
.lesson-card:hover{transform:translateY(-1px);box-shadow:0 4px 12px rgba(0,0,0,.12)}
.lesson-card.ailin{border-left-color:var(--pink);background:var(--pink-light)}
.lesson-card.daulet{border-left-color:var(--blue);background:var(--blue-light)}
.lc-time{font-size:.72rem;color:var(--gray);font-weight:500;margin-bottom:2px}
.lc-subject{font-size:.88rem;font-weight:700;margin-bottom:2px}
.lc-teacher{font-size:.75rem;color:var(--gray)}
.lc-child-badge{font-size:.65rem;font-weight:600;padding:2px 6px;border-radius:99px;position:absolute;top:8px;right:8px}
.badge-ailin{background:var(--pink-bg);color:#9d174d}
.badge-daulet{background:var(--blue-bg);color:#1e40af}

/* week card compact */
.lesson-card.compact{padding:6px 8px;border-radius:8px}
.lesson-card.compact .lc-time{font-size:.65rem}
.lesson-card.compact .lc-subject{font-size:.78rem}
.lesson-card.compact .lc-teacher{font-size:.68rem}
.lesson-card.compact .lc-child-badge{display:none}

/* FAB */
.fab{position:fixed;bottom:28px;right:24px;width:56px;height:56px;border-radius:50%;background:#1f2937;color:#fff;border:none;font-size:1.6rem;cursor:pointer;box-shadow:0 6px 20px rgba(0,0,0,.25);display:flex;align-items:center;justify-content:center;transition:background .15s,transform .1s;z-index:150}
.fab:hover{background:#374151;transform:scale(1.07)}
.fab-mic{right:92px;background:#7c3aed}
.fab-mic:hover{background:#6d28d9}
.fab-mic.listening{background:#dc2626;animation:pulse 1.2s infinite}
@keyframes pulse{0%{box-shadow:0 0 0 0 rgba(220,38,38,.5)}70%{box-shadow:0 0 0 14px rgba(220,38,38,0)}100%{box-shadow:0 0 0 0 rgba(220,38,38,0)}}

/* MODAL */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:300;align-items:flex-end;justify-content:center}
.overlay.show{display:flex}
.modal{background:#fff;border-radius:20px 20px 0 0;width:100%;max-width:520px;padding:24px 24px 36px;max-height:90vh;overflow-y:auto}
.modal-title{font-size:1.1rem;font-weight:700;margin-bottom:20px;display:flex;align-items:center;justify-content:space-between}
.btn-close{background:var(--gray-light);border:none;border-radius:50%;width:32px;height:32px;font-size:1.1rem;cursor:pointer;display:flex;align-items:center;justify-content:center}

.form-group{margin-bottom:16px}
.form-label{font-size:.82rem;font-weight:600;color:#374151;margin-bottom:6px;display:block}
.form-input,.form-select{width:100%;padding:10px 14px;border:1.5px solid var(--border);border-radius:10px;font-size:.9rem;font-family:inherit;background:#fff;transition:border-color .15s}
.form-input:focus,.form-select:focus{outline:none;border-color:#1f2937}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}

.input-with-mic{display:flex;gap:8px;align-items:center}
.input-with-mic .form-input{flex:1}
.btn-mic{flex-shrink:0;width:40px;height:40px;border-radius:10px;border:1.5px solid var(--border);background:#fff;font-size:1.05rem;cursor:pointer;transition:all .15s;display:flex;align-items:center;justify-content:center}
.btn-mic:hover{background:var(--gray-light)}
.btn-mic.listening{background:#fee2e2;border-color:#dc2626;animation:pulse 1.2s infinite}
.voice-hint{font-size:.78rem;color:var(--gray);margin:-4px 0 16px;padding:8px 10px;background:var(--gray-light);border-radius:8px}

.child-toggle{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.child-btn{padding:10px;border-radius:10px;border:2px solid var(--border);background:#fff;font-size:.88rem;font-weight:600;cursor:pointer;text-align:center;transition:all .15s}
.child-btn.sel-ailin{border-color:var(--pink);background:var(--pink-bg);color:#9d174d}
.child-btn.sel-daulet{border-color:var(--blue);background:var(--blue-bg);color:#1e40af}

.modal-actions{display:flex;gap:10px;margin-top:24px}
.btn-save{flex:1;padding:12px;background:#1f2937;color:#fff;border:none;border-radius:12px;font-size:.95rem;font-weight:600;cursor:pointer;transition:background .15s}
.btn-save:hover{background:#374151}
.btn-delete{padding:12px 18px;background:#fee2e2;color:#dc2626;border:none;border-radius:12px;font-size:.9rem;font-weight:600;cursor:pointer;transition:background .15s}
.btn-delete:hover{background:#fecaca}

@media(min-width:600px){
  .overlay{align-items:center}
  .modal{border-radius:20px;margin:20px}
}
@media(max-width:500px){
  .week-grid{grid-template-columns:repeat(7,minmax(80px,1fr));overflow-x:auto}
  .main{padding:12px 12px 100px}
  .day-tabs{gap:4px}
}
</style>
</head>
<body>

<div class="header">
  <div class="header-title">
    📅 Расписание детей
    <span>Айлин и Даулет</span>
  </div>
  <div class="legend">
    <div class="legend-chip chip-ailin">🩷 Айлин</div>
    <div class="legend-chip chip-daulet">💙 Даулет</div>
  </div>
</div>

<div class="week-nav">
  <button class="btn-nav" onclick="shiftWeek(-1)">←</button>
  <div class="week-label">
    <div id="weekLabel"></div>
    <small id="weekRange"></small>
  </div>
  <button class="btn-nav" onclick="shiftWeek(1)">→</button>
  <button class="btn-today-jump" onclick="goToday()">Сегодня</button>
</div>

<div class="tabs">
  <div class="tab active" id="tab-day" onclick="switchTab('day')">День</div>
  <div class="tab" id="tab-week" onclick="switchTab('week')">Неделя</div>
</div>

<div class="copy-banner" id="copyBanner">
  <span id="copyBannerText">Эта неделя пустая. Скопировать расписание с прошлой недели?</span>
  <button class="btn-copy" id="copyBannerBtn" onclick="copyFromLastWeek()">Скопировать</button>
</div>
<div class="copy-banner" id="templateBanner">
  <span>Загрузить обычное (учебное) расписание в эту неделю?</span>
  <button class="btn-copy" onclick="loadTemplate()">Загрузить шаблон</button>
</div>

<div class="main" id="main"></div>

<button class="fab fab-mic" id="voiceFab" onclick="voiceAdd()" title="Добавить занятие голосом">🎤</button>
<button class="fab" onclick="openAdd()" title="Добавить занятие">+</button>

<!-- MODAL -->
<div class="overlay" id="overlay" onclick="closeModal(event)">
  <div class="modal" id="modal">
    <div class="modal-title">
      <span id="modalTitle">Новое занятие</span>
      <button class="btn-close" onclick="closeModal()">✕</button>
    </div>
    <div class="form-group">
      <label class="form-label">Ребёнок</label>
      <div class="child-toggle">
        <button class="child-btn" id="btnAilin" onclick="selectChild('Айлин')">🩷 Айлин</button>
        <button class="child-btn" id="btnDaulet" onclick="selectChild('Даулет')">💙 Даулет</button>
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">День недели</label>
      <select class="form-select" id="fDay">
        <option value="0">Понедельник</option>
        <option value="1">Вторник</option>
        <option value="2">Среда</option>
        <option value="3">Четверг</option>
        <option value="4">Пятница</option>
        <option value="5">Суббота</option>
        <option value="6">Воскресенье</option>
      </select>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">Начало</label>
        <input class="form-input" type="time" id="fStart" value="10:00"/>
      </div>
      <div class="form-group">
        <label class="form-label">Конец</label>
        <input class="form-input" type="time" id="fEnd" value="11:00"/>
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">Предмет</label>
      <div class="input-with-mic">
        <input class="form-input" type="text" id="fSubject" placeholder="Математика, Английский…"/>
        <button type="button" class="btn-mic" onclick="dictateInto('fSubject', this)" title="Сказать предмет">🎤</button>
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">Учитель</label>
      <div class="input-with-mic">
        <input class="form-input" type="text" id="fTeacher" placeholder="Имя учителя"/>
        <button type="button" class="btn-mic" onclick="dictateInto('fTeacher', this)" title="Сказать имя учителя">🎤</button>
      </div>
    </div>
    <div class="voice-hint" id="voiceHint" style="display:none"></div>
    <div class="modal-actions">
      <button class="btn-save" onclick="saveLesson()">Сохранить</button>
      <button class="btn-delete" id="btnDelete" style="display:none" onclick="deleteLesson()">Удалить</button>
    </div>
  </div>
</div>

<script>
const DAY_NAMES = ['Пн','Вт','Ср','Чт','Пт','Сб','Вс'];
const DAY_FULL = ['Понедельник','Вторник','Среда','Четверг','Пятница','Суббота','Воскресенье'];
const MONTHS = ['января','февраля','марта','апреля','мая','июня','июля','августа','сентября','октября','ноября','декабря'];
const KEY = 'kids_schedule_v2';

const DEFAULT_TEMPLATE = [
  {"child":"Даулет","day":1,"start":"10:00","end":"11:00","subject":"Казахский","teacher":""},
  {"child":"Даулет","day":3,"start":"10:00","end":"11:00","subject":"Казахский","teacher":""},
  {"child":"Айлин","day":5,"start":"10:00","end":"11:00","subject":"Плаванье","teacher":""},
  {"child":"Даулет","day":0,"start":"11:00","end":"12:00","subject":"JJ","teacher":""},
  {"child":"Даулет","day":2,"start":"11:00","end":"12:00","subject":"JJ","teacher":""},
  {"child":"Даулет","day":4,"start":"11:00","end":"12:00","subject":"JJ","teacher":""},
  {"child":"Даулет","day":5,"start":"11:00","end":"12:00","subject":"Гольф","teacher":""},
  {"child":"Даулет","day":6,"start":"11:00","end":"12:00","subject":"Гольф","teacher":""},
  {"child":"Айлин","day":1,"start":"11:00","end":"12:00","subject":"Казахский","teacher":""},
  {"child":"Айлин","day":3,"start":"11:00","end":"12:00","subject":"Казахский","teacher":""},
  {"child":"Даулет","day":1,"start":"12:00","end":"13:00","subject":"Верховая езда 12:30","teacher":""},
  {"child":"Даулет","day":3,"start":"12:00","end":"13:00","subject":"Верховая езда 12:30","teacher":""},
  {"child":"Айлин","day":0,"start":"12:00","end":"13:00","subject":"Кулинария до 14:00","teacher":"Sen"},
  {"child":"Айлин","day":2,"start":"12:00","end":"13:00","subject":"Кулинария до 14:00","teacher":"Sen"},
  {"child":"Айлин","day":4,"start":"12:00","end":"13:00","subject":"Кулинария до 14:00","teacher":"Sen"},
  {"child":"Даулет","day":6,"start":"13:00","end":"14:00","subject":"Домбра","teacher":""},
  {"child":"Айлин","day":1,"start":"13:00","end":"14:00","subject":"Вокал","teacher":"Диана"},
  {"child":"Даулет","day":0,"start":"15:00","end":"16:00","subject":"Программирование","teacher":""},
  {"child":"Даулет","day":1,"start":"15:00","end":"16:00","subject":"Плавание","teacher":""},
  {"child":"Даулет","day":2,"start":"15:00","end":"16:00","subject":"Флейта","teacher":""},
  {"child":"Даулет","day":3,"start":"15:00","end":"16:00","subject":"Программирование","teacher":""},
  {"child":"Даулет","day":4,"start":"15:00","end":"16:00","subject":"Арттерапия","teacher":""},
  {"child":"Даулет","day":5,"start":"15:00","end":"16:00","subject":"Плавание","teacher":""},
  {"child":"Даулет","day":6,"start":"15:00","end":"16:00","subject":"Арттерапия","teacher":""},
  {"child":"Айлин","day":0,"start":"16:00","end":"17:00","subject":"Танцы","teacher":""},
  {"child":"Айлин","day":1,"start":"16:00","end":"17:00","subject":"Плаванье","teacher":""},
  {"child":"Айлин","day":2,"start":"16:00","end":"17:00","subject":"Танцы","teacher":""},
  {"child":"Айлин","day":4,"start":"16:00","end":"17:00","subject":"Танцы","teacher":""},
  {"child":"Даулет","day":3,"start":"17:00","end":"18:00","subject":"Футбол","teacher":""},
  {"child":"Даулет","day":4,"start":"18:00","end":"19:00","subject":"Флейта","teacher":""},
  {"child":"Даулет","day":5,"start":"18:00","end":"19:00","subject":"Верховая езда","teacher":""}
];

const VACATION_START = '2026-06-20';
const VACATION_END = '2026-08-28';

let currentWeekMonday = getMonday(new Date());
let currentTab = 'day';
let currentDayIdx = todayDayIdx();
let editingId = null;
let selectedChild = 'Айлин';

// --- DATA ---
function loadAll(){try{return JSON.parse(localStorage.getItem(KEY))||{};}catch{return {};}}
function saveAll(d){localStorage.setItem(KEY,JSON.stringify(d));}
function weekKey(monday){return fmtDate(monday);}
function getWeekData(monday){const all=loadAll();return all[weekKey(monday)]||[];}
function setWeekData(monday,arr){const all=loadAll();all[weekKey(monday)]=arr;saveAll(all);}

function weekOverlapsVacation(monday){
  const sun=fmtDate(addDays(monday,6));
  const mon=fmtDate(monday);
  return mon<=VACATION_END && sun>=VACATION_START;
}

function autoSeedVacationWeek(){
  if(weekOverlapsVacation(currentWeekMonday) && getWeekData(currentWeekMonday).length===0){
    const fresh=DEFAULT_TEMPLATE.map(l=>({...l,id:uid()}));
    setWeekData(currentWeekMonday,fresh);
  }
}

// --- DATES ---
function getMonday(d){const dt=new Date(d);const day=dt.getDay();const diff=day===0?-6:1-day;dt.setDate(dt.getDate()+diff);dt.setHours(0,0,0,0);return dt;}
function addDays(d,n){const r=new Date(d);r.setDate(r.getDate()+n);return r;}
function fmtDate(d){return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}
function todayDayIdx(){const d=new Date().getDay();return d===0?6:d-1;}
function isThisWeek(monday){return fmtDate(monday)===fmtDate(getMonday(new Date()));}
function uid(){return Math.random().toString(36).slice(2)+Date.now().toString(36);}

// --- RENDER ---
function render(){
  autoSeedVacationWeek();
  updateWeekNav();
  checkCopyBanner();
  if(currentTab==='day') renderDay();
  else renderWeek();
}

function updateWeekNav(){
  const mon=currentWeekMonday;
  const sun=addDays(mon,6);
  const wn=getWeekNumber(mon);
  document.getElementById('weekLabel').textContent=
    (isThisWeek(mon)?'Текущая неделя':'Неделя')+' №'+wn+
    (isThisWeek(mon)?' 📍':'')+
    (weekOverlapsVacation(mon)?' 🏖️ Каникулы':'');
  document.getElementById('weekRange').textContent=
    mon.getDate()+' '+MONTHS[mon.getMonth()]+' — '+sun.getDate()+' '+MONTHS[sun.getMonth()]+' '+sun.getFullYear();
}

function checkCopyBanner(){
  const cur=getWeekData(currentWeekMonday);
  const prev=getWeekData(addDays(currentWeekMonday,-7));
  const copyBanner=document.getElementById('copyBanner');
  const templateBanner=document.getElementById('templateBanner');
  if(cur.length>0){
    copyBanner.classList.remove('show');
    templateBanner.classList.remove('show');
    return;
  }
  if(prev.length>0){
    copyBanner.classList.add('show');
    templateBanner.classList.remove('show');
  } else {
    copyBanner.classList.remove('show');
    templateBanner.classList.add('show');
  }
}

function loadTemplate(){
  const fresh=DEFAULT_TEMPLATE.map(l=>({...l,id:uid()}));
  setWeekData(currentWeekMonday,fresh);
  render();
}

function renderDay(){
  const lessons=getWeekData(currentWeekMonday).filter(l=>l.day===currentDayIdx);
  lessons.sort((a,b)=>a.start.localeCompare(b.start));

  let html='<div class="day-tabs">';
  for(let i=0;i<7;i++){
    const dt=addDays(currentWeekMonday,i);
    const isToday=isThisWeek(currentWeekMonday)&&i===todayDayIdx();
    const count=getWeekData(currentWeekMonday).filter(l=>l.day===i).length;
    html+=`<div class="day-tab${i===currentDayIdx?' active':''}${isToday?' is-today':''}" onclick="selectDay(${i})">
      <div class="dt-name">${DAY_NAMES[i]}</div>
      <div class="dt-num">${dt.getDate()}</div>
      ${count>0?`<div style="font-size:.65rem;margin-top:2px;opacity:.7">${count}</div>`:''}
    </div>`;
  }
  html+='</div><div class="day-lessons">';

  if(lessons.length===0){
    html+=`<div class="empty-day"><div class="empty-icon">📭</div><p>Нет занятий</p><p style="margin-top:6px;font-size:.8rem">Нажмите + чтобы добавить</p></div>`;
  } else {
    lessons.forEach(l=>{
      html+=lessonCardHTML(l,false);
    });
  }
  html+='</div>';
  document.getElementById('main').innerHTML=html;
}

function renderWeek(){
  const data=getWeekData(currentWeekMonday);
  let html='<div class="week-grid">';
  for(let i=0;i<7;i++){
    const dt=addDays(currentWeekMonday,i);
    const isToday=isThisWeek(currentWeekMonday)&&i===todayDayIdx();
    const dayLessons=data.filter(l=>l.day===i).sort((a,b)=>a.start.localeCompare(b.start));
    html+=`<div class="week-col">
      <div class="week-col-head${isToday?' is-today':''}">
        <div class="wc-day">${DAY_NAMES[i]}</div>
        <div class="wc-date">${dt.getDate()}</div>
      </div>
      <div class="week-col-body">`;
    dayLessons.forEach(l=>{ html+=lessonCardHTML(l,true); });
    html+=`<button class="week-add-btn" onclick="openAdd(${i})">+</button>`;
    html+='</div></div>';
  }
  html+='</div>';
  document.getElementById('main').innerHTML=html;
}

function lessonCardHTML(l,compact){
  const cls=l.child==='Айлин'?'ailin':'daulet';
  const badge=l.child==='Айлин'?'badge-ailin':'badge-daulet';
  return `<div class="lesson-card ${cls}${compact?' compact':''}" onclick="openEdit('${l.id}')">
    <div class="lc-time">${l.start} – ${l.end}</div>
    <div class="lc-subject">${esc(l.subject||'—')}</div>
    <div class="lc-teacher">${esc(l.teacher||'')}</div>
    <span class="lc-child-badge ${badge}">${l.child==='Айлин'?'🩷':'💙'} ${l.child}</span>
  </div>`;
}

function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

// --- NAV ---
function shiftWeek(n){currentWeekMonday=addDays(currentWeekMonday,n*7);render();}
function goToday(){currentWeekMonday=getMonday(new Date());currentDayIdx=todayDayIdx();render();}
function switchTab(t){
  currentTab=t;
  document.getElementById('tab-day').classList.toggle('active',t==='day');
  document.getElementById('tab-week').classList.toggle('active',t==='week');
  render();
}
function selectDay(i){currentDayIdx=i;renderDay();}

// --- MODAL ---
function openAdd(dayIdx){
  editingId=null;
  selectedChild='Айлин';
  const d=dayIdx!==undefined?dayIdx:(currentTab==='day'?currentDayIdx:todayDayIdx());
  document.getElementById('modalTitle').textContent='Новое занятие';
  document.getElementById('fDay').value=d;
  document.getElementById('fStart').value='10:00';
  document.getElementById('fEnd').value='11:00';
  document.getElementById('fSubject').value='';
  document.getElementById('fTeacher').value='';
  document.getElementById('btnDelete').style.display='none';
  document.getElementById('voiceHint').style.display='none';
  updateChildBtns();
  document.getElementById('overlay').classList.add('show');
  setTimeout(()=>document.getElementById('fSubject').focus(),100);
}

function openEdit(id){
  const all=getWeekData(currentWeekMonday);
  const l=all.find(x=>x.id===id);
  if(!l)return;
  editingId=id;
  selectedChild=l.child;
  document.getElementById('modalTitle').textContent='Редактировать';
  document.getElementById('fDay').value=l.day;
  document.getElementById('fStart').value=l.start;
  document.getElementById('fEnd').value=l.end;
  document.getElementById('fSubject').value=l.subject||'';
  document.getElementById('fTeacher').value=l.teacher||'';
  document.getElementById('btnDelete').style.display='';
  updateChildBtns();
  document.getElementById('overlay').classList.add('show');
}

function closeModal(e){
  if(e&&e.target!==document.getElementById('overlay'))return;
  document.getElementById('overlay').classList.remove('show');
}

function selectChild(c){selectedChild=c;updateChildBtns();}
function updateChildBtns(){
  document.getElementById('btnAilin').className='child-btn'+(selectedChild==='Айлин'?' sel-ailin':'');
  document.getElementById('btnDaulet').className='child-btn'+(selectedChild==='Даулет'?' sel-daulet':'');
}

function saveLesson(){
  const subject=document.getElementById('fSubject').value.trim();
  if(!subject){document.getElementById('fSubject').focus();return;}
  const lesson={
    id:editingId||uid(),
    child:selectedChild,
    day:parseInt(document.getElementById('fDay').value),
    start:document.getElementById('fStart').value,
    end:document.getElementById('fEnd').value,
    subject,
    teacher:document.getElementById('fTeacher').value.trim(),
  };
  let arr=getWeekData(currentWeekMonday);
  if(editingId) arr=arr.map(x=>x.id===editingId?lesson:x);
  else arr.push(lesson);
  setWeekData(currentWeekMonday,arr);
  document.getElementById('overlay').classList.remove('show');
  render();
}

function deleteLesson(){
  if(!editingId)return;
  let arr=getWeekData(currentWeekMonday).filter(x=>x.id!==editingId);
  setWeekData(currentWeekMonday,arr);
  document.getElementById('overlay').classList.remove('show');
  render();
}

// --- VOICE INPUT ---
const SpeechRecognitionAPI = window.SpeechRecognition || window.webkitSpeechRecognition;

function getRecognizer(){
  if(!SpeechRecognitionAPI){
    alert('Голосовой ввод не поддерживается в этом браузере. Попробуйте Chrome или Safari.');
    return null;
  }
  const rec=new SpeechRecognitionAPI();
  rec.lang='ru-RU';
  rec.interimResults=false;
  rec.maxAlternatives=1;
  return rec;
}

function dictateInto(fieldId, btn){
  const rec=getRecognizer();
  if(!rec)return;
  btn.classList.add('listening');
  btn.textContent='●';
  rec.onresult=(e)=>{
    const text=e.results[0][0].transcript.trim();
    const field=document.getElementById(fieldId);
    field.value=text.charAt(0).toUpperCase()+text.slice(1);
  };
  rec.onerror=()=>{};
  rec.onend=()=>{btn.classList.remove('listening');btn.textContent='🎤';};
  rec.start();
}

const DAY_WORDS=[
  {re:/понедельник/i, day:0},{re:/вторник/i, day:1},{re:/сред[уаы]/i, day:2},
  {re:/четверг/i, day:3},{re:/пятниц/i, day:4},{re:/суббот/i, day:5},{re:/воскресень/i, day:6},
];

function parseVoiceText(text){
  const lower=text.toLowerCase();
  const result={child:null, day:null, start:null, end:null, subject:null, teacher:null};

  if(/айлин/i.test(lower)) result.child='Айлин';
  else if(/даулет/i.test(lower)) result.child='Даулет';

  if(/сегодня/i.test(lower)) result.day=todayDayIdx();
  else if(/завтра/i.test(lower)) result.day=(todayDayIdx()+1)%7;
  else { for(const dw of DAY_WORDS){ if(dw.re.test(lower)){ result.day=dw.day; break; } } }

  const rangeMatch=lower.match(/(?:с\s*)?(\d{1,2})[:.\s]?(\d{2})?\s*(?:до|по|-|–)\s*(\d{1,2})[:.\s]?(\d{2})?/);
  const singleMatch=lower.match(/(?:в|на)\s*(\d{1,2})[:.\s]?(\d{2})?\s*(?:часов|часа|час|утра|дня|вечера)?/);

  let cleaned=text;
  if(rangeMatch){
    const h1=rangeMatch[1].padStart(2,'0'), m1=(rangeMatch[2]||'00').padStart(2,'0');
    const h2=rangeMatch[3].padStart(2,'0'), m2=(rangeMatch[4]||'00').padStart(2,'0');
    result.start=`${h1}:${m1}`; result.end=`${h2}:${m2}`;
    cleaned=cleaned.replace(rangeMatch[0],' ');
  } else if(singleMatch){
    const h=singleMatch[1].padStart(2,'0'), m=(singleMatch[2]||'00').padStart(2,'0');
    result.start=`${h}:${m}`;
    const endH=String((parseInt(h)+1)%24).padStart(2,'0');
    result.end=`${endH}:${m}`;
    cleaned=cleaned.replace(singleMatch[0],' ');
  }

  const teacherMatch=cleaned.match(/учител[ьяю]\w*\s+([А-ЯЁ][а-яёА-ЯЁ]+(?:\s+[А-ЯЁ][а-яёА-ЯЁ]+)?)/i);
  if(teacherMatch){
    result.teacher=teacherMatch[1];
    cleaned=cleaned.replace(teacherMatch[0],' ');
  }

  cleaned=cleaned.replace(/айлин|даулет/gi,' ');
  cleaned=cleaned.replace(/сегодня|завтра/gi,' ');
  for(const dw of DAY_WORDS) cleaned=cleaned.replace(dw.re,' ');
  cleaned=cleaned.replace(/\s+/g,' ').trim();
  let prevLen;
  do{
    prevLen=cleaned.length;
    cleaned=cleaned.replace(/^(в|на|с|до|по|утра|дня|вечера|часов|часа|час)(\s|$)/i,'').trim();
    cleaned=cleaned.replace(/(\s)(в|на|с|до|по|утра|дня|вечера|часов|часа|час)$/i,'').trim();
  }while(cleaned.length!==prevLen && cleaned.length>0);
  cleaned=cleaned.replace(/^[,.\s-]+|[,.\s-]+$/g,'');
  if(cleaned) result.subject=cleaned.charAt(0).toUpperCase()+cleaned.slice(1);

  return result;
}

function voiceAdd(){
  const rec=getRecognizer();
  if(!rec)return;
  const fab=document.getElementById('voiceFab');
  fab.classList.add('listening');
  fab.textContent='●';
  rec.onresult=(e)=>{
    const text=e.results[0][0].transcript.trim();
    const parsed=parseVoiceText(text);
    openAdd(parsed.day!==null?parsed.day:undefined);
    if(parsed.child) selectChild(parsed.child);
    if(parsed.start) document.getElementById('fStart').value=parsed.start;
    if(parsed.end) document.getElementById('fEnd').value=parsed.end;
    if(parsed.subject) document.getElementById('fSubject').value=parsed.subject;
    if(parsed.teacher) document.getElementById('fTeacher').value=parsed.teacher;
    const hint=document.getElementById('voiceHint');
    hint.style.display='block';
    hint.textContent='🎤 Распознано: «'+text+'». Проверьте поля перед сохранением.';
  };
  rec.onerror=()=>{};
  rec.onend=()=>{fab.classList.remove('listening');fab.textContent='🎤';};
  rec.start();
}

function copyFromLastWeek(){
  const prev=getWeekData(addDays(currentWeekMonday,-7));
  if(!prev.length)return;
  const fresh=prev.map(l=>({...l,id:uid()}));
  setWeekData(currentWeekMonday,fresh);
  render();
}

function getWeekNumber(d){
  const dt=new Date(Date.UTC(d.getFullYear(),d.getMonth(),d.getDate()));
  const dayNum=dt.getUTCDay()||7;
  dt.setUTCDate(dt.getUTCDate()+4-dayNum);
  const yearStart=new Date(Date.UTC(dt.getUTCFullYear(),0,1));
  return Math.ceil((((dt-yearStart)/86400000)+1)/7);
}

// keyboard
document.addEventListener('keydown',e=>{
  if(e.key==='Escape') document.getElementById('overlay').classList.remove('show');
});

render();
</script>
