<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Расписание занятий</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: #f4f6fa;
      color: #222;
      min-height: 100vh;
    }

    header {
      background: #fff;
      border-bottom: 1px solid #e0e0e0;
      padding: 18px 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
    }

    header h1 {
      font-size: 1.3rem;
      font-weight: 700;
      letter-spacing: -0.3px;
    }

    .legend {
      display: flex;
      gap: 20px;
      font-size: 0.9rem;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .legend-dot {
      width: 16px;
      height: 16px;
      border-radius: 4px;
    }

    .dot-ailin  { background: #f8a4b8; }
    .dot-daulet { background: #7eb8e8; }

    .btn-reset {
      background: #f0f0f0;
      border: 1px solid #ddd;
      border-radius: 8px;
      padding: 7px 16px;
      font-size: 0.85rem;
      cursor: pointer;
      transition: background .15s;
    }
    .btn-reset:hover { background: #e0e0e0; }

    .scroll-wrap {
      overflow-x: auto;
      padding: 28px 32px 48px;
    }

    table {
      border-collapse: collapse;
      min-width: 900px;
      background: #fff;
      border-radius: 14px;
      overflow: hidden;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
    }

    thead th {
      background: #3a3a4a;
      color: #fff;
      font-size: 0.88rem;
      font-weight: 600;
      padding: 13px 18px;
      text-align: center;
      letter-spacing: 0.3px;
      white-space: nowrap;
    }

    thead th:first-child { border-radius: 0; }

    tbody tr { transition: filter .1s; }
    tbody tr:hover { filter: brightness(0.96); }

    td {
      padding: 0;
      border: 1px solid rgba(0,0,0,0.08);
      vertical-align: middle;
    }

    .td-time {
      padding: 12px 16px;
      font-weight: 600;
      font-size: 0.88rem;
      white-space: nowrap;
      text-align: center;
      min-width: 130px;
    }

    .td-child {
      padding: 12px 16px;
      font-weight: 600;
      font-size: 0.88rem;
      text-align: center;
      min-width: 90px;
    }

    .row-ailin  { background: #fde8ef; }
    .row-daulet { background: #dceefa; }

    .cell-edit {
      width: 100%;
      min-width: 130px;
      min-height: 52px;
      padding: 10px 14px;
      border: none;
      background: transparent;
      font-family: inherit;
      font-size: 0.85rem;
      color: #333;
      resize: none;
      line-height: 1.4;
      cursor: text;
      outline: none;
      display: block;
      transition: background .15s;
    }

    .cell-edit:focus {
      background: rgba(255,255,255,0.7);
      border-radius: 4px;
    }

    .row-ailin  .cell-edit:focus { background: rgba(255,255,255,0.75); }
    .row-daulet .cell-edit:focus { background: rgba(255,255,255,0.75); }

    .hint {
      text-align: center;
      font-size: 0.8rem;
      color: #aaa;
      margin-top: 16px;
    }

    @media (max-width: 640px) {
      header { padding: 12px 16px; flex-wrap: wrap; }
      .scroll-wrap { padding: 16px 8px 40px; }
    }
  </style>
</head>
<body>

<header>
  <h1>📅 Расписание занятий</h1>
  <div class="legend">
    <div class="legend-item"><div class="legend-dot dot-ailin"></div> Айлин</div>
    <div class="legend-item"><div class="legend-dot dot-daulet"></div> Даулет</div>
  </div>
  <button class="btn-reset" onclick="resetAll()">Сбросить всё</button>
</header>

<div class="scroll-wrap">
  <table id="schedule">
    <thead>
      <tr>
        <th>Время</th>
        <th>Ребёнок</th>
        <th>Понедельник</th>
        <th>Вторник</th>
        <th>Среда</th>
        <th>Четверг</th>
        <th>Пятница</th>
        <th>Суббота</th>
        <th>Воскресенье</th>
      </tr>
    </thead>
    <tbody id="tbody"></tbody>
  </table>
  <p class="hint">Нажмите на любую ячейку, чтобы ввести предмет и учителя. Данные сохраняются автоматически.</p>
</div>

<script>
  const SLOTS = [
    { time: '10:00 – 11:00', child: 'Айлин',  cls: 'row-ailin'  },
    { time: '12:00 – 13:00', child: 'Даулет', cls: 'row-daulet' },
    { time: '13:00 – 14:00', child: 'Айлин',  cls: 'row-ailin'  },
    { time: '15:00 – 16:00', child: 'Даулет', cls: 'row-daulet' },
    { time: '16:00 – 17:00', child: 'Айлин',  cls: 'row-ailin'  },
    { time: '18:00 – 19:00', child: 'Даулет', cls: 'row-daulet' },
  ];

  const DAYS = 7;
  const STORAGE_KEY = 'schedule_data';

  function loadData() {
    try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || {}; }
    catch { return {}; }
  }

  function saveData(data) {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
  }

  function cellKey(row, day) { return `${row}_${day}`; }

  function build() {
    const data = loadData();
    const tbody = document.getElementById('tbody');
    tbody.innerHTML = '';

    SLOTS.forEach((slot, row) => {
      const tr = document.createElement('tr');
      tr.className = slot.cls;

      const tdTime = document.createElement('td');
      tdTime.className = 'td-time';
      tdTime.textContent = slot.time;
      tr.appendChild(tdTime);

      const tdChild = document.createElement('td');
      tdChild.className = 'td-child';
      tdChild.textContent = slot.child;
      tr.appendChild(tdChild);

      for (let day = 0; day < DAYS; day++) {
        const td = document.createElement('td');
        const key = cellKey(row, day);
        const ta = document.createElement('textarea');
        ta.className = 'cell-edit';
        ta.placeholder = 'Предмет\nУчитель';
        ta.value = data[key] || '';
        ta.rows = 2;
        ta.addEventListener('input', () => {
          const d = loadData();
          d[key] = ta.value;
          saveData(d);
        });
        td.appendChild(ta);
        tr.appendChild(td);
      }

      tbody.appendChild(tr);
    });
  }

  function resetAll() {
    if (!confirm('Сбросить все данные расписания?')) return;
    localStorage.removeItem(STORAGE_KEY);
    build();
  }

  build();
</script>
</body>
</html>
